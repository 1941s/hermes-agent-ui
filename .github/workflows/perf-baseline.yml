name: Perf Baseline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  perf-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Start API
        run: |
          nohup python -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 >/tmp/api.log 2>&1 &
          sleep 5

      - name: Run baseline gate
        env:
          HERMES_BENCH_DURATION_SEC: "60"
          HERMES_BENCH_MIN_FPS_EQ: "45"
          HERMES_BENCH_MAX_PARSE_ERRORS: "0"
          HERMES_BENCH_MAX_WS_ERRORS: "0"
        run: pnpm perf:baseline

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-report
          path: perf-reports/*.json
